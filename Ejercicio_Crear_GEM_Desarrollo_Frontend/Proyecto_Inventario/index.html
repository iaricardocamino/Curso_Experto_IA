<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de Hardware | Tech Lead Edition</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <h1>Gestión de Inventario de Hardware</h1>
        <div class="search-container">
            <input type="text" id="globalSearch" placeholder="Buscar por modelo, categoría o ubicación...">
        </div>
    </header>

    <main class="inventory-wrapper">
        <table id="inventoryTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Categoría</th>
                    <th>Modelo</th>
                    <th>Número de Serie</th>
                    <th>Ubicación</th>
                    <th>Stock</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="inventoryBody">
                <!-- Se poblará con JS -->
            </tbody>
        </table>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
